<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIGHT NODE NFT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F26C22;
            --primary-dark: #D85A1B;
            --primary-glow: rgba(242, 108, 34, 0.5);
            --bg: #0A0A0A;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
            --text: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --text-tertiary: rgba(255, 255, 255, 0.6);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 顶部栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: contain;
        }
        
        .logo-text {
            font-size: 16px;
            font-weight: 600;
            color: #FFFFFF;
            letter-spacing: -0.3px;
        }
        
        .connect-btn {
            padding: 8px 16px;
            border: 1px solid rgba(242, 108, 34, 0.3);
            border-radius: 8px;
            background: transparent;
            color: var(--primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .connect-btn:hover {
            background: rgba(242, 108, 34, 0.1);
            border-color: rgba(242, 108, 34, 0.5);
        }
        
        /* 主内容区 */
        .main-content {
            padding-top: 60px;
            padding-bottom: 80px;
        }
        
        /* 页面切换 */
        .page {
            display: none;
            padding: 20px;
            max-width: 430px;
            margin: 0 auto;
        }
        
        .page.active {
            display: block;
        }
        
        /* 首页样式 */
        .hero-section {
            text-align: center;
            padding: 60px 0 40px;
        }
        
        .hero-logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
            border-radius: 20px;
            object-fit: contain;
        }
        
        .hero-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #FFFFFF, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
        }
        
        /* 卡片样式 */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-title-icon {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
        }
        
        .card-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.8;
        }
        
        .highlight {
            color: var(--primary);
            font-weight: 600;
        }
        
        /* 轻节点页面 */
        .node-stats {
            text-align: center;
            padding: 30px 0;
        }
        
        .node-count {
            font-size: 56px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 0 0 30px var(--primary-glow);
        }
        
        .node-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .income-card {
            background: linear-gradient(135deg, rgba(242, 108, 34, 0.1), rgba(242, 108, 34, 0.02));
            border: 1px solid rgba(242, 108, 34, 0.2);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .income-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }
        
        .income-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        
        .income-unit {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .claim-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .claim-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow);
        }
        
        .claim-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* 记录列表 */
        .record-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .record-item:last-child {
            border-bottom: none;
        }
        
        .record-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .record-date {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .record-amount {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
        }
        
        .record-status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(242, 108, 34, 0.1);
            color: var(--primary);
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 0;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 4px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .nav-item.active::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--primary);
            border-radius: 2px;
        }
        
        .nav-icon {
            font-size: 20px;
            opacity: 0.5;
            transition: all 0.3s ease;
        }
        
        .nav-item.active .nav-icon {
            opacity: 1;
            color: var(--primary);
        }
        
        .nav-label {
            font-size: 11px;
            opacity: 0.5;
            transition: all 0.3s ease;
        }
        
        .nav-item.active .nav-label {
            opacity: 1;
            color: var(--primary);
        }
        
        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .page.active {
            animation: fadeIn 0.3s ease;
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(242, 108, 34, 0.3);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <!-- 顶部栏 -->
    <header class="header">
        <div class="logo">
            <img src="logo.jpg" alt="LIGHT NODE">
            <span class="logo-text">LIGHT NODE</span>
        </div>
        <button class="connect-btn" onclick="connectWallet()">链接钱包</button>
    </header>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 首页 - 简化版 -->
        <div class="page active" id="page-home">
            <div class="hero-section">
                <img src="logo.jpg" alt="LIGHT NODE" class="hero-logo">
                <h1 class="hero-title">LIGHT NODE NFT</h1>
                <p class="hero-subtitle">持有 NFT 收益权益证明<br>持有即权益，收益每天发生</p>
            </div>
            
            <div class="card">
                <h2 class="card-title">
                    <span class="card-title-icon"></span>
                    持有权益
                </h2>
                <p class="card-text">
                    <span class="highlight">LIGHT NODE NFT</span> 是链上收益权益证明，持有即代表拥有轻节点身份。<br><br>
                    持有者可每日领取对应收益，无需复杂操作，只需持有 NFT 即可获得节点权益身份。<br><br>
                    <span class="highlight">NFT 即凭证，持有即权益。</span>
                </p>
            </div>
        </div>
        
        <!-- 轻节点页面 -->
        <div class="page" id="page-node">
            <div class="node-stats">
                <div class="node-count" id="nodeCount">3</div>
                <div class="node-label">持有 LIGHT NODE 数量</div>
            </div>
            
            <div class="income-card">
                <div class="income-label">当日可领取收益</div>
                <div class="income-value" id="todayIncome">12.50</div>
                <div class="income-unit">USDT</div>
            </div>
            
            <button class="claim-btn" id="claimBtn" onclick="claimIncome()">领取当日收益</button>
            
            <div class="card">
                <h2 class="card-title">
                    <span class="card-title-icon"></span>
                    领取记录
                </h2>
                <div class="record-list" id="recordList">
                    <div class="record-item">
                        <div class="record-info">
                            <span class="record-date">2026-06-29</span>
                            <span class="record-amount">+12.50 USDT</span>
                        </div>
                        <span class="record-status">已领取</span>
                    </div>
                    <div class="record-item">
                        <div class="record-info">
                            <span class="record-date">2026-06-28</span>
                            <span class="record-amount">+12.50 USDT</span>
                        </div>
                        <span class="record-status">已领取</span>
                    </div>
                    <div class="record-item">
                        <div class="record-info">
                            <span class="record-date">2026-06-27</span>
                            <span class="record-amount">+12.50 USDT</span>
                        </div>
                        <span class="record-status">已领取</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('home')">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">首页</span>
        </div>
        <div class="nav-item" onclick="switchPage('node')">
            <span class="nav-icon">◆</span>
            <span class="nav-label">轻节点</span>
        </div>
    </nav>

    <script>
        // 页面切换
        function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('page-' + page).classList.add('active');
            event.currentTarget.classList.add('active');
        }
        
        // 连接钱包
        function connectWallet() {
            alert('请连接您的钱包');
        }
        
        // 领取收益
        function claimIncome() {
            const btn = document.getElementById('claimBtn');
            const income = document.getElementById('todayIncome').textContent;
            const today = new Date().toISOString().split('T')[0];
            
            btn.disabled = true;
            btn.textContent = '领取中...';
            
            setTimeout(() => {
                btn.textContent = '已领取';
                btn.disabled = true;
                
                // 添加记录
                const recordList = document.getElementById('recordList');
                const newRecord = document.createElement('div');
                newRecord.className = 'record-item';
                newRecord.innerHTML = `
                    <div class="record-info">
                        <span class="record-date">${today}</span>
                        <span class="record-amount">+${income} USDT</span>
                    </div>
                    <span class="record-status">已领取</span>
                `;
                recordList.insertBefore(newRecord, recordList.firstChild);
                
                // 重置收益
                document.getElementById('todayIncome').textContent = '0.00';
            }, 1500);
        }
    </script>
</body>
</html>
